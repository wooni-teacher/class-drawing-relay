.dr-h1,.dr-h2,.dr-btn,.dr-badge{font-family:'Jua', sans-serif;}
.dr-h1{font-size:32px;text-align:center;margin:4px 0 6px;letter-spacing:-0.5px; color:var(--deep); text-shadow:0 2px 0 rgba(255,255,255,0.6);}
.dr-h2{font-size:20px;margin:0 0 12px;text-align:center;}
.dr-sub{text-align:center;color:#3E5A78;margin-bottom:18px;font-size:14px;}
.dr-card{
  background:var(--card); border:3px solid var(--ink); border-radius:20px;
  box-shadow:var(--shadow); padding:20px; max-width:520px; margin:0 auto 16px;
}
.dr-btn{
  display:block;width:100%; background:var(--blue); color:#fff; border:3px solid var(--ink);
  border-radius:14px; padding:13px; font-size:17px; cursor:pointer;
  box-shadow:4px 4px 0 rgba(15,61,102,0.75); transition:transform .08s ease; margin-bottom:10px;
}
.dr-btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 rgba(15,61,102,0.75);}
.dr-btn:disabled{opacity:.5;cursor:not-allowed;}
.dr-btn.yellow{background:var(--yellow); color:var(--ink);}
.dr-btn.outline{background:#fff; color:var(--ink);}
.dr-btn.small{padding:8px 12px; font-size:13px; display:inline-block; width:auto; margin-bottom:0;}
.dr-input{
  width:100%; padding:12px 14px; font-size:17px; border-radius:12px;
  border:3px solid var(--ink); margin-bottom:12px; font-family:'Gowun Dodum',sans-serif;
}
.dr-label{font-size:13px; color:#3E5A78; display:block; margin-bottom:4px; margin-top:8px;}
.dr-timerbar{height:12px; background:#eee; border:2px solid var(--ink); border-radius:999px; overflow:hidden; margin-bottom:14px;}
.dr-timerfill{height:100%; background:var(--yellow); transition:width .25s linear;}
.dr-roster{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:14px;}
.dr-chip{border:2px solid var(--ink); border-radius:999px; padding:6px 12px; font-size:13px; background:#fff;}
.dr-chip.active{background:var(--yellow); font-weight:bold;}
.dr-chip.done{background:#dfe6ee; color:#8494a8; text-decoration:line-through;}
.dr-topic-chip{
  border:2px solid var(--ink); border-radius:999px; padding:6px 10px 6px 14px; font-size:13px; background:#fff;
  display:flex; align-items:center; gap:6px;
}
.dr-topic-chip button{
  border:none; background:var(--coral); color:#fff; border-radius:50%; width:18px;height:18px;
  font-size:11px; cursor:pointer; line-height:1;
}
.dr-prompt{

<script>
(function(){

const CANVAS_W = 600, CANVAS_H = 400;
const DEFAULT_TURN_SEC = 35;
const DEFAULT_ROUNDS = 10;
const DEFAULT_COLLECT_MIN = 5;
const MAX_WORDS_PER_PLAYER = 5;
const COLORS = ["#17233F","#FF7A6B","#FFD166","#2FBF8F","#2AA8C4","#4C7EFF","#F28C28","#8B5E3C"];
const SIZES = [4,10,20];
const ERASER_SIZES = [16,28,44];
const WHEEL_PALETTE = ['#FF7A6B','#2AA8C4','#4C7EFF','#2FBF8F','#F28C28','#D6449C','#0F3D66','#C9A227','#2AA876','#8B5E3C'];
const PROMPTS = [
  "몰래 문어 다리를 하나 그려 넣어보세요 🐙",
  "그림 속에 무지개를 살짝 추가해보세요 🌈",
  "작은 별을 하나 숨겨보세요 ⭐",
  "엉뚱한 표정의 얼굴을 하나 그려보세요 😆",
  "구름이나 하트를 그려 넣어보세요 ☁️",
  "동물 한 마리를 자유롭게 추가해보세요 🐶",
  "멋진 모자를 씌워보세요 🎩",
  "번개나 폭죽을 그려보세요 ⚡",
  "이전 그림에 이어지는 이야기를 상상해서 그려보세요",
  "작은 집이나 나무를 하나 그려보세요 🏠",
  "웃긴 콧수염을 하나 추가해보세요 👨",
  "풍선이나 비눗방울을 그려보세요 🎈",
];

let myRole = null;
let myId = "p_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
let myName = "";
let myGameId = null;
let db = null;

let activeTimerInterval = null;
let collectTimerInterval = null;
let finishing = false;
let finalizingWords = false;
let ctx = null, canvasEl = null;
let curColor = COLORS[0], curSize = SIZES[1], curEraserSize = ERASER_SIZES[0];
let isEraser = false;
let turnBaseSrc = null;
let isDrawing = false;
let myWords = [];
let creatingLobby = false;

// host-only local (not synced) lobby settings
let roundsSetting = DEFAULT_ROUNDS;
let turnSeconds = DEFAULT_TURN_SEC;
let collectMinutes = DEFAULT_COLLECT_MIN;
let topicsList = [];
let chosenTheme = null;
let wheelSpinning = false;

let rosterRef = null;
let wordsCountRef = null;
let stateRef = null;

const app = document.getElementById("dr-app");
function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
function randomPrompt(){ return PROMPTS[Math.floor(Math.random()*PROMPTS.length)]; }
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

// ---------- FIREBASE HELPERS ----------
function initFirebaseApp(){
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
}
async function getState(){
  const snap = await db.ref("session/state").get();
  return snap.exists() ? snap.val() : null;
}
async function setState(s){
  await db.ref("session/state").set(s);
  return s;
}
function showFatalError(title, detail){
  app.innerHTML = `
    <div class="dr-card dr-center">
      <div class="dr-h2">⚠️ ${esc(title)}</div>
      <div class="dr-small" style="text-align:left; white-space:pre-line;">${esc(detail)}</div>
    </div>
  `;
}
function subscribeState(cb){
  if(stateRef) stateRef.off();
  stateRef = db.ref("session/state");
  stateRef.on("value",
    (snap)=>{ cb(snap.exists() ? snap.val() : null); },
    (err)=>{
      showFatalError(
        "데이터베이스 접근 오류",
        "Realtime Database에 연결하지 못했어요.\n\n오류 메시지: " + err.message +
        "\n\n확인해볼 것:\n1) Firebase 콘솔에서 Realtime Database를 활성화했는지\n2) 규칙(Rules) 탭에 database.rules.json 내용을 게시했는지\n3) databaseURL 지역(asia-southeast1 등)이 실제 만든 위치와 일치하는지"
      );
    }
  );
}
function newGameId(){ return "g" + Date.now(); }

async function getRoster(gid){
  const snap = await db.ref("session/players/" + gid).get();
  return snap.exists() ? Object.values(snap.val()) : [];
}
function subscribeRoster(gid, cb){
  unsubscribeRoster();
  rosterRef = db.ref("session/players/" + gid);
  rosterRef.on("value", (snap)=>{ cb(snap.exists() ? Object.values(snap.val()) : []); });
}
function unsubscribeRoster(){ if(rosterRef){ rosterRef.off(); rosterRef=null; } }

function subscribeWordsCount(gid, cb){
  unsubscribeWordsCount();
  wordsCountRef = db.ref("session/words/" + gid);
  wordsCountRef.on("value", (snap)=>{ cb(snap.exists() ? Object.keys(snap.val()).length : 0); });
}
function unsubscribeWordsCount(){ if(wordsCountRef){ wordsCountRef.off(); wordsCountRef=null; } }

async function getCanvas(gid){
  const snap = await db.ref("session/canvas/" + gid).get();
  return snap.exists() ? snap.val() : null;
}
async function setCanvas(gid, dataURL){
  await db.ref("session/canvas/" + gid).set(dataURL);
}
async function saveMyWords(){
  if(!myGameId) return;
  try{ await db.ref("session/words/" + myGameId + "/" + myId).set(myWords); }catch(e){}
}

function blankDataURL(){
  const c = document.createElement("canvas"); c.width=CANVAS_W; c.height=CANVAS_H;
  const cx = c.getContext("2d"); cx.fillStyle="#ffffff"; cx.fillRect(0,0,CANVAS_W,CANVAS_H);
  return c.toDataURL("image/png");
}

async function hostCreateLobby(){
  const gid = newGameId();
  const s = { gameId: gid, status:"lobby", rounds: DEFAULT_ROUNDS, turnOrder:[], turnIndex:0, turnStartTime:0,
    turnDurationMs: DEFAULT_TURN_SEC*1000, collectDurationMs: DEFAULT_COLLECT_MIN*60000, collectStartTime:0,
    prompt:"", theme:"" };
  try{ await db.ref("session/players").remove(); }catch(e){}
  try{ await db.ref("session/canvas").remove(); }catch(e){}
  try{ await db.ref("session/words").remove(); }catch(e){}
  await setState(s);
  return s;
}
function resetHostLocalSettings(){
  roundsSetting = DEFAULT_ROUNDS; turnSeconds = DEFAULT_TURN_SEC; collectMinutes = DEFAULT_COLLECT_MIN;
  topicsList = []; chosenTheme = null; wheelSpinning = false;
}

function collectTimeLeft(state){
  const dur = state.collectDurationMs || DEFAULT_COLLECT_MIN*60000;
  return Math.max(0, dur - (Date.now() - (state.collectStartTime||Date.now())));
}
function timeLeftMs(state){
  const dur = state.turnDurationMs || DEFAULT_TURN_SEC*1000;
  return Math.max(0, dur - (Date.now() - state.turnStartTime));
}

async function finalizeCollecting(state){
  if(finalizingWords) return;
  finalizingWords = true;
  const snap = await db.ref("session/words/" + state.gameId).get();
  const val = snap.exists() ? snap.val() : {};
  const freq = {};
  Object.values(val).forEach(arr=>{
    (arr||[]).forEach(w=>{
      const key = (w||"").trim();
      if(!key) return;
      freq[key] = (freq[key]||0) + 1;
    });
  });
  const sorted = Object.keys(freq).sort((a,b)=> freq[b]-freq[a]);
  topicsList = sorted.slice(0,10);
  const ns = Object.assign({}, state, {status:"topics"});
  await setState(ns);
  finalizingWords = false;
  render(ns);
}

async function hostStart(state){
  const roster = await getRoster(state.gameId);
  const shuffled = shuffle(roster.slice());
  const n = Math.min(state.rounds || DEFAULT_ROUNDS, shuffled.length);
  const chosen = shuffled.slice(0, n).sort((a,b)=>a.joinedAt - b.joinedAt);
  state.turnOrder = chosen.map(p=>({id:p.id, name:p.name}));
  state.turnIndex = 0;
  state.turnStartTime = Date.now();
  state.status = "drawing";
  state.prompt = randomPrompt();
  state.theme = chosenTheme || "";
  try{ await setCanvas(state.gameId, blankDataURL()); }catch(e){}
  await setState(state);
}

async function advanceTurn(state, savedDataURL){
  const next = Object.assign({}, state);
  if(savedDataURL){
    try{ await setCanvas(state.gameId, savedDataURL); }catch(e){}
  }
  if(state.turnIndex + 1 >= state.turnOrder.length){
    next.status = "end";
  }else{
    next.turnIndex = state.turnIndex + 1;
    next.turnStartTime = Date.now();
    next.prompt = randomPrompt();
  }
  await setState(next);
  return next;
}

// ---------- RENDER ----------
function render(state){
  clearInterval(activeTimerInterval);
  clearInterval(collectTimerInterval);
  unsubscribeRoster();
  unsubscribeWordsCount();
  if(!myRole){ renderRoleSelect(); return; }
  if(myRole === "host"){ renderHost(state); return; }
  renderPlayer(state);
}

function renderRoleSelect(){
  app.innerHTML = `
    <div class="dr-h1">🎨 협동 그림 릴레이</div>
    <div class="dr-sub">한 명씩 이어 그려서 우리 반만의 그림을 완성해요!</div>
    <div class="dr-card dr-center">
      <div class="dr-h2">누구신가요?</div>
      <button class="dr-btn" id="dr-role-host">👩‍🏫 선생님이에요 (게임 진행)</button>
      <button class="dr-btn outline" id="dr-role-player">🙋 학생이에요 (게임 참가)</button>
      <div class="dr-small">이 페이지 링크를 학생들에게 공유하면, 각자 자기 기기에서 접속해 참여할 수 있어요.</div>
    </div>
  `;
  document.getElementById("dr-role-host").onclick = ()=>{
    myRole = "host";
    subscribeState(render);
  };
  document.getElementById("dr-role-player").onclick = ()=>{
    myRole = "player";
    subscribeState(render);
  };
}

function renderPlayer(state){
  if(!myName){ renderJoinForm(state); return; }
  if(!state){ app.innerHTML = `<div class="dr-h1">⏳ 접속 중...</div><div class="dr-sub">선생님 화면을 기다리고 있어요</div>`; return; }
  if(state.status === "lobby") return renderPlayerLobby(state);
  if(state.status === "collecting") return renderPlayerCollecting(state);
  if(state.status === "topics") return renderPlayerTopicsWait(state);
  if(state.status === "drawing") return renderDrawingScreen(state, false);
  if(state.status === "end") return renderEndScreen(state);
}

function renderJoinForm(state){
  app.innerHTML = `
    <div class="dr-h1">🙋 참가하기</div>
    <div class="dr-card">
      <div class="dr-h2" style="font-size:16px;">닉네임을 입력하세요</div>
      <input class="dr-input" id="dr-name-input" maxlength="10" placeholder="예: 그림왕 민준" />
      <button class="dr-btn yellow" id="dr-join-btn">게임 참가하기 🚀</button>
      ${!state ? '<div class="dr-small">선생님이 게임을 준비하면 참가할 수 있어요. 준비되는 대로 자동으로 진행돼요.</div>' : ''}
    </div>
  `;
  document.getElementById("dr-join-btn").onclick = async ()=>{
    const nameEl = document.getElementById("dr-name-input");
    const name = nameEl.value.trim();
    if(!name){ nameEl.style.borderColor = "var(--coral)"; return; }
    myName = name;
    let s = state || await getState();
    while(!s){ await new Promise(r=>setTimeout(r,1500)); s = await getState(); }
    myGameId = s.gameId;
    try{ await db.ref("session/players/" + s.gameId + "/" + myId).set({id:myId,name:myName,joinedAt:Date.now()}); }catch(e){}
    render(s);
  };
}

function renderPlayerLobby(state){
  app.innerHTML = `
    <div class="dr-h1">🎨 협동 그림 릴레이</div>
    <div class="dr-card dr-center">
      <div class="dr-h2">${esc(myName)}님, 준비 완료! ✅</div>
      <div class="dr-sub" style="margin-bottom:0;">선생님이 게임을 시작하면<br>자동으로 화면이 바뀌어요.</div>
      <div style="margin-top:16px; font-size:40px;">⏳</div>
    </div>
  `;
}

function wordChipsHtml(){
  if(myWords.length===0) return '<span class="dr-small">아직 제출한 단어가 없어요</span>';
  return myWords.map((w,i)=>`<span class="dr-topic-chip">${esc(w)}<button data-i="${i}">✕</button></span>`).join("");
}
function refreshWordList(){
  const el = document.getElementById("dr-word-list");
  if(el){
    el.innerHTML = wordChipsHtml();
    el.querySelectorAll("button[data-i]").forEach(b=>{
      b.onclick = ()=>{
        const i = parseInt(b.getAttribute("data-i"),10);
        myWords.splice(i,1);
        saveMyWords();
        refreshWordList();
        updateWordCountNote();
      };
    });
  }
}
function updateWordCountNote(){
  const note = document.getElementById("dr-word-count-note");
  if(note) note.textContent = myWords.length + "/" + MAX_WORDS_PER_PLAYER + "개 제출함";
}
function addWordFromInput(){
  const input = document.getElementById("dr-word-input");
  const v = input.value.trim();
  if(!v) return;
  if(myWords.length >= MAX_WORDS_PER_PLAYER){ alert("최대 " + MAX_WORDS_PER_PLAYER + "개까지만 제출할 수 있어요!"); return; }
  myWords.push(v);
  input.value = "";
  saveMyWords();
  refreshWordList();
  updateWordCountNote();
}

function renderPlayerCollecting(state){
  const left = collectTimeLeft(state);
  const dur = state.collectDurationMs || DEFAULT_COLLECT_MIN*60000;
  const pct = Math.round((left/dur)*100);
  app.innerHTML = `
    <div class="dr-h2">🧩 추억 조각모음 시간!</div>
    <div class="dr-sub">우리 반 추억이 담긴 단어를 자유롭게 적어보세요<br>(예: 수학여행, 체육대회, 인생네컷)</div>
    <div class="dr-timerbar"><div class="dr-timerfill" id="dr-ctfill" style="width:${pct}%"></div></div>
    <div class="dr-card">
      <div style="display:flex; gap:8px; margin-bottom:12px;">
        <input class="dr-input" id="dr-word-input" maxlength="12" placeholder="단어 입력" style="margin-bottom:0;" />
        <button class="dr-btn small yellow" id="dr-word-add-btn">추가</button>
      </div>
      <div class="dr-roster" id="dr-word-list">${wordChipsHtml()}</div>
      <div class="dr-small dr-center" id="dr-word-count-note">${myWords.length}/${MAX_WORDS_PER_PLAYER}개 제출함</div>
    </div>
  `;
  document.getElementById("dr-word-add-btn").onclick = addWordFromInput;
  document.getElementById("dr-word-input").addEventListener("keydown", (e)=>{
    if(e.key === "Enter"){ e.preventDefault(); addWordFromInput(); }
  });
  clearInterval(collectTimerInterval);
  collectTimerInterval = setInterval(()=>{
    const l = collectTimeLeft(state);
    const p = Math.round((l/dur)*100);
    const fill = document.getElementById("dr-ctfill");
    if(fill) fill.style.width = p + "%";
    if(l<=0){
      clearInterval(collectTimerInterval);
      const inp = document.getElementById("dr-word-input");
      const btn = document.getElementById("dr-word-add-btn");
      if(inp) inp.disabled = true;
      if(btn) btn.disabled = true;
      const note = document.getElementById("dr-word-count-note");
      if(note) note.innerHTML = "⏳ 시간 종료! 선생님이 주제를 정하는 중이에요...";
    }
  }, 300);
}

function renderPlayerTopicsWait(state){
  app.innerHTML = `
    <div class="dr-h1">🎨 협동 그림 릴레이</div>
    <div class="dr-card dr-center">
      <div style="font-size:40px;">🎡</div>
      <div class="dr-h2">선생님이 오늘의 주제를 정하고 있어요!</div>
      <div class="dr-sub" style="margin-bottom:0;">잠시만 기다려주세요...</div>
    </div>
  `;
}

async function renderDrawingScreen(state, isHost){
  const current = state.turnOrder[state.turnIndex];
  const iAmActive = !isHost && current && current.id === myId;
  const myIdx = state.turnOrder.findIndex(p=>p.id===myId);
  const left = timeLeftMs(state);
  const dur = state.turnDurationMs || DEFAULT_TURN_SEC*1000;
  const pct = Math.round((left/dur)*100);
  const themeBanner = state.theme ? `<div class="dr-theme-banner">🎯 오늘의 주제: ${esc(state.theme)}</div>` : "";

  let orderChips = state.turnOrder.map((p,i)=>{
    let cls = "dr-chip";
    if(i === state.turnIndex) cls += " active";
    else if(i < state.turnIndex) cls += " done";
    return `<span class="${cls}">${esc(p.name)}</span>`;
  }).join("");

  if(iAmActive){
    app.innerHTML = `
      <div class="dr-h2">✏️ 지금 당신 차례예요! (${state.turnIndex+1}/${state.turnOrder.length})</div>
      ${themeBanner}
      <div class="dr-timerbar"><div class="dr-timerfill" id="dr-tfill" style="width:${pct}%"></div></div>
      <div class="dr-prompt">🎲 깜짝 미션: ${esc(state.prompt)}</div>
      <div class="dr-canvas-wrap"><canvas id="dr-canvas" width="${CANVAS_W}" height="${CANVAS_H}"></canvas></div>
      <div class="dr-toolbar" id="dr-mode-tabs"></div>
      <div class="dr-toolbar" id="dr-colors"></div>
      <div class="dr-toolbar" id="dr-sizes"></div>
      <div class="dr-toolbar">
        <button class="dr-btn outline small" id="dr-reset-btn">↩️ 다시 그리기</button>
      </div>
      <button class="dr-btn yellow" id="dr-finish-btn">✅ 완성! 다음 사람에게 넘기기</button>
      <div class="dr-roster">${orderChips}</div>
    `;
    canvasEl = document.getElementById("dr-canvas");
    ctx = canvasEl.getContext("2d");
    isEraser = false;
    setupToolbar();
    let base = null;
    try{ base = await getCanvas(state.gameId); }catch(e){}
    turnBaseSrc = base || blankDataURL();
    await loadImageToCanvas(turnBaseSrc);
    attachDrawingHandlers();
    document.getElementById("dr-reset-btn").onclick = async ()=>{ await loadImageToCanvas(turnBaseSrc); };
    document.getElementById("dr-finish-btn").onclick = ()=> finishTurn(state);
    clearInterval(activeTimerInterval);
    activeTimerInterval = setInterval(()=>{
      const l = timeLeftMs(state);
      const p = Math.round((l/dur)*100);
      const fill = document.getElementById("dr-tfill");
      if(fill) fill.style.width = p + "%";
      if(l<=0){ clearInterval(activeTimerInterval); finishTurn(state); }
    }, 250);
    return;
  }

  clearInterval(activeTimerInterval);
  let base = null;
  try{ base = await getCanvas(state.gameId); }catch(e){}
  const imgSrc = base || blankDataURL();
  let waitNote = "";
  if(!isHost){
    if(myIdx === state.turnIndex + 1) waitNote = `<div class="dr-badge">🔔 다음은 당신 차례예요!</div>`;
    else if(myIdx > -1) waitNote = `<div class="dr-small">당신은 ${myIdx+1}번째 순서예요 (전체 ${state.turnOrder.length}명)</div>`;
    else waitNote = `<div class="dr-small">이번 라운드에는 참여하지 않아요. 그림 구경 재미도 놓치지 마세요!</div>`;
  }
  app.innerHTML = `
    <div class="dr-h2">✏️ ${esc(current ? current.name : "")}님이 그리는 중... (${state.turnIndex+1}/${state.turnOrder.length})</div>
    ${themeBanner}
    <div class="dr-timerbar"><div class="dr-timerfill" style="width:${pct}%"></div></div>
    <div class="dr-prompt">🎲 깜짝 미션: ${esc(state.prompt)}</div>
    <div class="dr-canvas-wrap"><img src="${imgSrc}" style="width:100%;display:block;" /></div>
    ${waitNote}
    <div class="dr-roster">${orderChips}</div>
    ${isHost ? `<button class="dr-btn outline small" id="dr-skip-btn" style="margin:10px auto;display:block;">⏭️ 이 차례 건너뛰기</button>` : ""}
  `;
  if(isHost){
    document.getElementById("dr-skip-btn").onclick = async ()=>{
      if(!confirm("이 학생의 차례를 건너뛸까요? (그림은 저장되지 않아요)")) return;
      await advanceTurn(state, null);
    };
  }
}

function setupToolbar(){
  const modeWrap = document.getElementById("dr-mode-tabs");
  modeWrap.innerHTML = `
    <button class="dr-btn small ${!isEraser?'yellow':'outline'}" id="dr-mode-brush">🖌️ 브러시</button>
    <button class="dr-btn small ${isEraser?'yellow':'outline'}" id="dr-mode-eraser">🧽 지우개</button>
  `;
  document.getElementById("dr-mode-brush").onclick = ()=>{ isEraser=false; setupToolbar(); };
  document.getElementById("dr-mode-eraser").onclick = ()=>{ isEraser=true; setupToolbar(); };

  const colorsWrap = document.getElementById("dr-colors");
  if(isEraser){
    colorsWrap.innerHTML = `<div class="dr-small">지우개는 흰색으로 덧칠해서 지워요</div>`;
  }else{
    colorsWrap.innerHTML = "";
    COLORS.forEach(c=>{
      const b = document.createElement("div");
      b.className = "dr-swatch" + (c===curColor?" sel":"");
      b.style.background = c;
      b.onclick = ()=>{ curColor = c; setupToolbar(); };
      colorsWrap.appendChild(b);
    });

function setupSizeButtons(){
  const wrap = document.getElementById("dr-sizes");
  wrap.innerHTML = "";
  const arr = isEraser ? ERASER_SIZES : SIZES;
  const cur = isEraser ? curEraserSize : curSize;
  arr.forEach(s=>{
    const b = document.createElement("div");
    b.className = "dr-size-btn" + (s===cur?" sel":"");
    const dot = document.createElement("div");
    dot.className = "dr-size-dot";
    const dim = Math.min(s, 22);
    dot.style.width = dim+"px"; dot.style.height = dim+"px";
    b.appendChild(dot);
    b.onclick = ()=>{ if(isEraser){ curEraserSize = s; } else { curSize = s; } setupSizeButtons(); };
    wrap.appendChild(b);
  });
}

function loadImageToCanvas(src){
  return new Promise((resolve)=>{
    const img = new Image();
    img.onload = ()=>{ ctx.clearRect(0,0,CANVAS_W,CANVAS_H); ctx.drawImage(img,0,0,CANVAS_W,CANVAS_H); resolve(); };
    img.onerror = ()=> resolve();
    img.src = src;
  });
}

function getPos(e){
  const rect = canvasEl.getBoundingClientRect();
  const scaleX = CANVAS_W / rect.width;
  const scaleY = CANVAS_H / rect.height;
  return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
}

function attachDrawingHandlers(){
  isDrawing = false;
  canvasEl.onpointerdown = (e)=>{
    isDrawing = true;
    const p = getPos(e);
    ctx.beginPath(); ctx.moveTo(p.x, p.y);
    canvasEl.setPointerCapture(e.pointerId);
  };
  canvasEl.onpointermove = (e)=>{
    if(!isDrawing) return;
    const p = getPos(e);
    ctx.strokeStyle = isEraser ? "#FFFFFF" : curColor;
    ctx.lineWidth = isEraser ? curEraserSize : curSize;
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.lineTo(p.x, p.y); ctx.stroke();
  };
  canvasEl.onpointerup = ()=>{ isDrawing = false; };
  canvasEl.onpointerleave = ()=>{ isDrawing = false; };
}

async function finishTurn(state){
  if(finishing) return;
  finishing = true;
  clearInterval(activeTimerInterval);
  let dataURL = null;
  try{ dataURL = canvasEl.toDataURL("image/png"); }catch(e){}
  await advanceTurn(state, dataURL || null);
  finishing = false;
}

async function renderEndScreen(state){
  let imgSrc = null;
  try{ imgSrc = await getCanvas(state.gameId); }catch(e){}
  const contributors = state.turnOrder.map(p=>`<span class="dr-chip">${esc(p.name)}</span>`).join("");
  app.innerHTML = `
    <div class="dr-winner-banner">🎉 우리 반 협동 작품 완성!</div>
    ${state.theme ? `<div class="dr-theme-banner">🎯 오늘의 주제: ${esc(state.theme)}</div>` : ""}
    <img class="dr-final-img" src="${imgSrc || ''}" />
    <div class="dr-card dr-center">
      <div class="dr-h2" style="font-size:16px;">함께 그린 친구들</div>
      <div class="dr-contrib">${contributors}</div>
      <a class="dr-btn yellow" style="text-decoration:none; margin-top:14px;" href="${imgSrc || '#'}" download="우리반_협동그림.png">🖼️ 그림 다운로드</a>
    </div>
    <div class="dr-small dr-center" style="margin-top:6px;">모두 수고했어요! 즐거운 방학 되세요 🎈</div>
  `;
  fireConfetti();
}

function fireConfetti(){
  const colors = ["#FFD166","#2AA8C4","#FF7A6B","#4C7EFF","#2FBF8F"];
  for(let i=0;i<28;i++){
    const el = document.createElement("div");
    el.className = "dr-confetti";
    el.style.left = Math.random()*100 + "%";
    el.style.background = colors[i%colors.length];
    el.style.animation = "drfall " + (2+Math.random()*1.5) + "s ease-in forwards";
    el.style.animationDelay = (Math.random()*0.6) + "s";
    document.getElementById("dr-root").appendChild(el);
    setTimeout(()=>el.remove(), 4500);
  }
}

// ---------- HOST ----------
async function renderHost(state){
  if(!state){
    if(creatingLobby) return;
    creatingLobby = true;
    try{
      await hostCreateLobby();
    }catch(e){
      creatingLobby = false;
      showFatalError(
        "게임 생성 오류",
        "새 게임 방을 만들지 못했어요.\n\n오류 메시지: " + (e && e.message ? e.message : String(e)) +
        "\n\n확인해볼 것:\n1) Firebase 콘솔에서 Realtime Database를 활성화했는지\n2) 규칙(Rules) 탭에 database.rules.json 내용을 게시했는지"
      );
      return;
    }
    creatingLobby = false;
    return; // the write triggers subscribeState callback again with real data
  }
  if(state.status === "lobby") return renderHostLobbyInitial(state);
  if(state.status === "collecting") return renderHostCollecting(state);
  if(state.status === "topics") return renderHostTopics(state);
  if(state.status === "drawing") return renderDrawingScreen(state, true);
  if(state.status === "end") return renderEndScreen(state);
}

function rosterChipsHtml(roster){
  return roster.map(p=>`<span class="dr-chip">🙋 ${esc(p.name)}</span>`).join("") || '<span class="dr-small">아직 아무도 참가하지 않았어요</span>';
}

    <div class="dr-sub">선생님 진행 화면</div>
    <div class="dr-card">
      <div class="dr-h2">참가자 (<span id="dr-roster-count">0</span>명)</div>
      <div class="dr-roster" id="dr-roster-list">${rosterChipsHtml([])}</div>
    </div>
    <div class="dr-card">
      <div class="dr-h2" style="font-size:16px;">⚙️ 게임 설정</div>
      <label class="dr-label">🔁 라운드 수 (최대 10명이 그려요, 참가자가 더 많으면 무작위로 뽑아요)</label>

      <label class="dr-label">🧩 추억 조각모음 시간 (분, 5~10)</label>

    </div>

      <button class="dr-btn yellow" id="dr-start-collect-btn" disabled>🧩 추억 조각모음 시작하기</button>
      <button class="dr-btn outline" id="dr-reset-btn">🔄 새 게임 만들기 (초기화)</button>
    </div>
  `;
  subscribeRoster(state.gameId, (roster)=>{
    const listEl = document.getElementById("dr-roster-list");

    const btn = document.getElementById("dr-start-collect-btn");

  document.getElementById("dr-rounds-input").oninput = (e)=>{ const v=parseInt(e.target.value,10); if(!isNaN(v)) roundsSetting = v; };
  document.getElementById("dr-duration-input").oninput = (e)=>{ const v=parseInt(e.target.value,10); if(!isNaN(v)) turnSeconds = v; };
  document.getElementById("dr-collectmin-input").oninput = (e)=>{ const v=parseInt(e.target.value,10); if(!isNaN(v)) collectMinutes = v; };
  document.getElementById("dr-start-collect-btn").onclick = async ()=>{
    state.rounds = Math.max(2, Math.min(10, roundsSetting || DEFAULT_ROUNDS));
    state.turnDurationMs = Math.max(10, Math.min(120, turnSeconds || DEFAULT_TURN_SEC)) * 1000;
    state.collectDurationMs = Math.max(5, Math.min(10, collectMinutes || DEFAULT_COLLECT_MIN)) * 60000;
    state.collectStartTime = Date.now();
    state.status = "collecting";
    await setState(state);
  };
  document.getElementById("dr-reset-btn").onclick = async ()=>{
    if(!confirm("새 게임을 시작하면 지금까지의 참가자 목록과 설정이 초기화돼요. 계속할까요?")) return;
    resetHostLocalSettings();
    await hostCreateLobby();
  };

function renderHostCollecting(state){
  const dur = state.collectDurationMs || DEFAULT_COLLECT_MIN*60000;
  const left0 = collectTimeLeft(state);
  const pct0 = Math.round((left0/dur)*100);
  app.innerHTML = `
    <div class="dr-h2">🧩 추억 조각모음 진행 중</div>
    <div class="dr-timerbar"><div class="dr-timerfill" id="dr-ctfill-host" style="width:${pct0}%"></div></div>
    <div class="dr-progress-note" id="dr-collect-count">✍️ 0명이 단어를 제출했어요</div>
    <div class="dr-card dr-center">
      <div class="dr-small">학생들이 우리 반 추억 단어를 모으고 있어요.<br>시간이 끝나면 자동으로 다음 단계(주제 돌림판)로 넘어가요.</div>
      <button class="dr-btn outline" id="dr-finish-collect-btn" style="margin-top:12px;">⏭️ 지금 마감하고 다음으로</button>
    </div>
  `;
  document.getElementById("dr-finish-collect-btn").onclick = ()=> finalizeCollecting(state);

    const el = document.getElementById("dr-collect-count");

  collectTimerInterval = setInterval(()=>{

function topicChipsHtml(){
  if(topicsList.length===0) return '<span class="dr-small">주제를 2개 이상 추가해주세요</span>';
  return topicsList.map((t,i)=>`<span class="dr-topic-chip">${i+1}. ${esc(t)}<button data-i="${i}">✕</button></span>`).join("");
}
function refreshTopicList(){
  const el = document.getElementById("dr-topic-list");
  if(el){
    el.innerHTML = topicChipsHtml();
    el.querySelectorAll("button[data-i]").forEach(b=>{
      b.onclick = ()=>{
        const i = parseInt(b.getAttribute("data-i"),10);
        topicsList.splice(i,1);
        chosenTheme = null;
        const resEl = document.getElementById("dr-theme-result");
        if(resEl) resEl.innerHTML = "";
        refreshTopicList();
        refreshWheelArea();
        updateStartButtonState();
      };
    });
  }
}
function addTopicFromInput(){
  const input = document.getElementById("dr-topic-input");
  const v = input.value.trim();
  if(!v) return;
  topicsList.push(v);
  input.value = "";
  chosenTheme = null;
  const resEl = document.getElementById("dr-theme-result");
  if(resEl) resEl.innerHTML = "";
  refreshTopicList();
  refreshWheelArea();
  updateStartButtonState();
}

function point(angleDeg, radius, cx, cy){
  const a = angleDeg * Math.PI/180;
  return { x: cx + radius*Math.sin(a), y: cy - radius*Math.cos(a) };
}

function wheelAreaHtml(){
  if(topicsList.length < 2){
    return `<div class="dr-small dr-center" style="margin:10px 0;">🎡 주제를 2개 이상 추가하면 돌림판이 나타나요</div>`;
  }
  const n = topicsList.length;
  const size=220, cx=110, cy=110, r=100;
  const sliceAngle = 360/n;
  let paths = "", labels = "";
  for(let i=0;i<n;i++){
    const a0 = i*sliceAngle, a1=(i+1)*sliceAngle;
    const p0 = point(a0, r, cx, cy), p1 = point(a1, r, cx, cy);
    const largeArc = (a1-a0) > 180 ? 1 : 0;
    const color = WHEEL_PALETTE[i % WHEEL_PALETTE.length];
    paths += `<path d="M ${cx} ${cy} L ${p0.x.toFixed(1)} ${p0.y.toFixed(1)} A ${r} ${r} 0 ${largeArc} 1 ${p1.x.toFixed(1)} ${p1.y.toFixed(1)} Z" fill="${color}" stroke="#17233F" stroke-width="2"/>`;
    const mid = a0 + sliceAngle/2;
    const lp = point(mid, r*0.65, cx, cy);
    labels += `<text x="${lp.x.toFixed(1)}" y="${lp.y.toFixed(1)}" fill="#fff" font-family="Jua" font-size="20" text-anchor="middle" dominant-baseline="middle">${i+1}</text>`;
  }
  return `
    <div class="dr-wheel-wrap">
      <div class="dr-wheel-pointer"></div>
      <svg id="dr-wheel-svg" width="${size}" height="${size}" viewBox="0 0 220 220" style="display:block; transform:rotate(0deg); transform-origin:110px 110px;">
        ${paths}${labels}
        <circle cx="110" cy="110" r="14" fill="#fff" stroke="#17233F" stroke-width="3"/>
      </svg>
    </div>
  `;
}
function refreshWheelArea(){
  const el = document.getElementById("dr-wheel-area");
  if(el) el.innerHTML = wheelAreaHtml();
}
function themeResultHtml(){
  return `<div class="dr-badge" style="background:var(--green); font-size:14px;">🎯 오늘의 주제: ${esc(chosenTheme)}</div>`;
}
function spinWheel(){
  if(wheelSpinning) return;
  if(topicsList.length < 2){ alert("주제를 2개 이상 추가해주세요!"); return; }
  wheelSpinning = true;
  const n = topicsList.length;
  const sliceAngle = 360/n;
  const chosenIndex = Math.floor(Math.random()*n);
  const centerAngle = chosenIndex*sliceAngle + sliceAngle/2;
  const spins = 5;
  const rotation = spins*360 + ((360 - centerAngle) % 360);
  const svg = document.getElementById("dr-wheel-svg");
  if(svg){
    svg.style.transition = "transform 3.5s cubic-bezier(0.17,0.67,0.32,1.02)";
    svg.style.transform = `rotate(${rotation}deg)`;
  }
  const resEl = document.getElementById("dr-theme-result");
  if(resEl) resEl.innerHTML = `<div class="dr-small">🎲 돌아가는 중...</div>`;
  setTimeout(()=>{
    wheelSpinning = false;
    chosenTheme = topicsList[chosenIndex];
    const r2 = document.getElementById("dr-theme-result");
    if(r2) r2.innerHTML = themeResultHtml();
    updateStartButtonState();
  }, 3600);
}
function updateStartButtonState(){
  const btn = document.getElementById("dr-start-btn");
  if(!btn) return;
  btn.disabled = !chosenTheme;
}

function renderHostTopics(state){
  app.innerHTML = `
    <div class="dr-h1">🎨 협동 그림 릴레이</div>
    <div class="dr-sub">선생님 진행 화면 · 총 ${state.rounds}라운드 · ${Math.round((state.turnDurationMs||DEFAULT_TURN_SEC*1000)/1000)}초/명</div>
    <div class="dr-card">
      <div class="dr-h2" style="font-size:16px;">🎯 오늘의 주제 정하기</div>
      <div class="dr-small dr-center" style="margin-bottom:10px;">추억 조각모음에서 많이 나온 단어들이 자동으로 담겼어요. 직접 추가/삭제도 가능해요.</div>
      <div style="display:flex; gap:8px; margin-bottom:12px;">
        <input class="dr-input" id="dr-topic-input" placeholder="주제 직접 추가" style="margin-bottom:0;" />
        <button class="dr-btn small yellow" id="dr-topic-add-btn">추가</button>
      </div>
      <div class="dr-roster" id="dr-topic-list">${topicChipsHtml()}</div>
      <div id="dr-wheel-area">${wheelAreaHtml()}</div>
      <button class="dr-btn yellow" id="dr-spin-btn">🎡 돌림판 돌리기!</button>
      <div id="dr-theme-result" class="dr-center">${chosenTheme ? themeResultHtml() : ""}</div>
    </div>
    <div class="dr-card dr-center">
      <button class="dr-btn yellow" id="dr-start-btn" ${!chosenTheme?"disabled":""}>🚀 게임 시작하기</button>
    </div>
  `;
  document.getElementById("dr-topic-add-btn").onclick = addTopicFromInput;
  document.getElementById("dr-topic-input").addEventListener("keydown", (e)=>{
    if(e.key === "Enter"){ e.preventDefault(); addTopicFromInput(); }
  });
  document.getElementById("dr-spin-btn").onclick = spinWheel;
  document.getElementById("dr-start-btn").onclick = async ()=>{ await hostStart(state); };
}

// ---------- BOOT ----------
function boot(){
  const missing = (typeof firebaseConfig === "undefined") || !firebaseConfig || firebaseConfig.apiKey === "YOUR_API_KEY_HERE";
  if(missing){
    app.innerHTML = `
      <div class="dr-card dr-center">
        <div class="dr-h2">⚠️ Firebase 설정이 필요해요</div>
        <div class="dr-small">firebase-config.js 파일을 열어 본인의 Firebase 프로젝트 설정 값을 입력한 뒤 새로고침 해주세요.<br>자세한 방법은 README.md를 참고하세요.</div>
      </div>
    `;
    return;
  }
  try{
    initFirebaseApp();
  }catch(e){
    app.innerHTML = `<div class="dr-card dr-center"><div class="dr-h2">⚠️ Firebase 초기화 오류</div><div class="dr-small">${esc(String(e))}</div></div>`;
    return;
  }
  render(null);
}
boot();

})();
